<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | Hiroki Kobayashi</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pages/contact.css">
</head>
<body data-page="contact" data-page-title="Contact" data-page-tagline="Hiroki Kobayashi" data-page-description="Contact Hiroki Kobayashi for research, engineering, and collaboration inquiries in computer vision, anomaly detection, and industrial AI.">
  <div id="site-header"></div>
  <div id="site-nav"></div>

  <main class="single-column">
    <div class="content contact-page content--contact">
      <section aria-labelledby="contact-methods-heading">
        <h2 id="contact-methods-heading" class="section-label">Contact Form</h2>

        <div class="contact-grid">
          <article class="contact-card contact-card--form">
            <form id="contact-form" class="contact-form">
              <label for="contact-name" class="contact-form-label">Your Name</label>
              <input id="contact-name" name="name" type="text" class="contact-form-input" required>

              <label for="contact-email" class="contact-form-label">Your Email</label>
              <input id="contact-email" name="email" type="email" class="contact-form-input" required>

              <label for="contact-subject" class="contact-form-label">Subject</label>
              <input id="contact-subject" name="subject" type="text" class="contact-form-input" required>

              <label for="contact-message" class="contact-form-label">Message</label>
              <textarea id="contact-message" name="message" class="contact-form-textarea" rows="6" required></textarea>

              <div class="contact-actions">
                <button type="submit" class="contact-action-btn">Send Message</button>
                <span id="contact-form-status" class="copy-status" aria-live="polite"></span>
              </div>
            </form>
          </article>
        </div>
      </section>

      <section class="contact-note" aria-labelledby="contact-note-heading">
        <h2 id="contact-note-heading" class="section-label">Inquiry Scope</h2>
        <p class="contact-note-text">
          I welcome research, engineering, and collaboration inquiries related to computer vision,
          anomaly detection, industrial AI, representation learning, and practical deep learning systems.
        </p>
      </section>
    </div>
  </main>

  <footer id="site-footer"></footer>
  <script src="js/main.js"></script>
  <script src="js/pages/contact.js"></script>
</body>
</html>
