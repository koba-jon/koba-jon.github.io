<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/main.css">
  <link rel="stylesheet" href="assets/css/components.css">
  <link rel="stylesheet" href="assets/css/pages/awards.css">
</head>
<body data-page="awards" data-page-title="Awards" data-page-tagline="Hiroki Kobayashi">
  <div id="site-header"></div>
  <div id="site-nav"></div>
  
  <main class="single-column">
    <div class="content content--awards">
      <section>
        <div class="section-label">Awards</div>
        <div class="awards-count-bar">
          <div class="awards-count-cell"><span class="awards-count-num" id="count-research">—</span><span class="awards-count-label">Research Presentation Awards</span></div>
          <div class="awards-count-cell"><span class="awards-count-num" id="count-review">—</span><span class="awards-count-label">Review Awards</span></div>
          <div class="awards-count-cell"><span class="awards-count-num" id="count-scholarship">—</span><span class="awards-count-label">Scholarships / Financial Honors</span></div>
        </div>
      </section>

      <section>
        <div class="section-label">Research Presentation Awards</div>
        <div class="award-cards" id="list-research"></div>
      </section>

      <section>
        <div class="section-label">Review Awards</div>
        <div class="award-cards" id="list-review"></div>
      </section>

      <section>
        <div class="section-label">Scholarships / Financial Honors</div>
        <div class="award-cards" id="list-scholarship"></div>
      </section>
    </div>
  </main>

  <footer id="site-footer"></footer>
  <script src="assets/js/main.js"></script>
  <script src="assets/js/pages/awards.js"></script>
</body>
</html>
