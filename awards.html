<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Awards | Hiroki Kobayashi</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pages/awards.css">
</head>
<body data-page="awards" data-page-title="Awards" data-page-title-ja="受賞" data-page-image="images/svm_cpp.png" data-page-description="Awards and honors received by Hiroki Kobayashi, including research presentation awards, review recognitions, and scholarships.">
  <div id="site-header"></div>
  <div id="site-nav"></div>

  <main class="single-column">
    <div class="content content--awards">
      <section aria-labelledby="awards-overview-heading">
        <h2 id="awards-overview-heading" class="section-label" data-i18n="awards.overviewTitle">Awards Overview</h2>
        <div class="awards-count-bar">
          <div class="awards-count-cell"><span class="awards-count-num" id="count-research">—</span><span class="awards-count-label" data-i18n="awards.researchPresentation">Research Presentation Awards</span></div>
          <div class="awards-count-cell"><span class="awards-count-num" id="count-review">—</span><span class="awards-count-label" data-i18n="awards.reviewAwards">Review Awards</span></div>
          <div class="awards-count-cell"><span class="awards-count-num" id="count-scholarship">—</span><span class="awards-count-label" data-i18n="awards.scholarships">Scholarships / Financial Honors</span></div>
        </div>
      </section>

      <section aria-labelledby="research-awards-heading">
        <h2 id="research-awards-heading" class="section-label" data-i18n="awards.researchPresentation">Research Presentation Awards</h2>
        <div class="award-cards" id="list-research"></div>
      </section>

      <section aria-labelledby="review-awards-heading">
        <h2 id="review-awards-heading" class="section-label" data-i18n="awards.reviewAwards">Review Awards</h2>
        <div class="award-cards" id="list-review"></div>
      </section>

      <section aria-labelledby="scholarship-awards-heading">
        <h2 id="scholarship-awards-heading" class="section-label" data-i18n="awards.scholarships">Scholarships / Financial Honors</h2>
        <div class="award-cards" id="list-scholarship"></div>
      </section>
    </div>
  </main>

  <footer id="site-footer"></footer>
  <script src="js/main.js"></script>
  <script src="js/pages/awards.js"></script>
</body>
</html>
