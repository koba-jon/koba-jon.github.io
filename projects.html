<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Projects | Hiroki Kobayashi</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pages/projects.css">
</head>
<body data-page="projects" data-page-title="Projects" data-page-tagline="Hiroki Kobayashi">
  <div id="site-header"></div>
  <div id="site-nav"></div>

  <main class="single-column">
    <div class="content">
      <section aria-labelledby="project-overview-heading">
        <h2 id="project-overview-heading" class="section-label">Project Overview</h2>
        <div class="stats-bar">
          <div class="stat-item"><span id="research-count" class="stat-number">—</span><span class="stat-label">Research Projects</span></div>
          <div class="stat-item"><span id="opensource-count" class="stat-number">—</span><span class="stat-label">Open Source Projects</span></div>
          <div class="stat-item"><span id="total-count" class="stat-number">—</span><span class="stat-label">Total Projects</span></div>
        </div>
        <div class="projects-block" id="research-projects">
          <h3 class="projects-section-title">Research Projects</h3>
          <div class="projects-grid"></div>
        </div>
        <div class="projects-block" id="opensource-projects">
          <h3 class="projects-section-title">Open Source Projects</h3>
          <div class="projects-grid"></div>
        </div>
      </section>
    </div>
  </main>

  <footer id="site-footer"></footer>
  <script src="js/main.js"></script>
  <script src="js/pages/projects.js"></script>
</body>
</html>
