<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Projects | Hiroki Kobayashi</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pages/projects.css">
</head>
<body data-page="projects" data-page-title="Projects" data-page-title-ja="プロジェクト" data-page-tagline="Hiroki Kobayashi" data-page-tagline-ja="小林大起" data-page-image="images/pytorch_cpp.png" data-page-description="Research and open-source projects by Hiroki Kobayashi, including industrial AI, anomaly detection, and computer vision engineering work.">
  <div id="site-header"></div>
  <div id="site-nav"></div>

  <main class="single-column">
    <div class="content">
      <section aria-labelledby="project-overview-heading">
        <h2 id="project-overview-heading" class="section-label" data-i18n="projects.overviewTitle">Project Overview</h2>
        <div class="stats-bar">
          <div class="stat-item"><span id="research-count" class="stat-number">—</span><span class="stat-label" data-i18n="projects.researchProjects">Research Projects</span></div>
          <div class="stat-item"><span id="opensource-count" class="stat-number">—</span><span class="stat-label" data-i18n="projects.openSourceProjects">Open Source Projects</span></div>
          <div class="stat-item"><span id="github-stars-total" class="stat-number">—</span><span class="stat-label" data-i18n="projects.githubStars">GitHub Stars</span></div>
          <div class="stat-item"><span id="github-forks-total" class="stat-number">—</span><span class="stat-label" data-i18n="projects.githubForks">GitHub Forks</span></div>
        </div>
        <div class="project-filters" aria-label="Project filters" data-i18n-aria-label="projects.filtersAria">
          <div class="project-filter-field project-filter-field--keyword">
            <label for="project-search-keyword" class="project-filter-label" data-i18n="projects.keyword">Keyword</label>
            <input id="project-search-keyword" type="search" class="project-filter-input" placeholder="Title / Tag / Description" data-i18n-placeholder="projects.keywordPlaceholder">
          </div>
          <div class="project-filter-field">
            <label for="project-filter-tag" class="project-filter-label" data-i18n="projects.tag">Tag</label>
            <select id="project-filter-tag" class="project-filter-select">
              <option value="" data-i18n="projects.allTags">All tags</option>
            </select>
          </div>
          <button id="project-filter-reset" class="project-filter-reset-btn" type="button" data-i18n="projects.reset">Reset</button>
        </div>
        <p class="project-filter-summary" id="project-filter-summary" aria-live="polite"></p>
        <div class="projects-block" id="research-projects">
          <h3 class="projects-section-title" data-i18n="projects.researchProjects">Research Projects</h3>
          <div class="projects-grid"></div>
        </div>
        <div class="projects-block" id="opensource-projects">
          <h3 class="projects-section-title" data-i18n="projects.openSourceProjects">Open Source Projects</h3>
          <div class="projects-grid"></div>
        </div>
      </section>
    </div>
  </main>

  <footer id="site-footer"></footer>
  <script src="js/main.js"></script>
  <script src="js/pages/projects.js"></script>
</body>
</html>
