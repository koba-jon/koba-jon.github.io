<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Publications | Hiroki Kobayashi</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pages/publications.css">
</head>
<body data-page="publications" data-page-title="Publications" data-page-tagline="Hiroki Kobayashi">
  <div id="site-header"></div>
  <div id="site-nav"></div>

  <main class="single-column">
    <div class="content content--publications">
      <section aria-labelledby="publication-overview-heading">
        <h2 id="publication-overview-heading" class="section-label">Publication Overview</h2>
        <div class="pub-stats-bar">
          <div class="pub-stat"><span class="pub-stat-num" id="stat-journal">—</span><span class="pub-stat-label">Journal Papers</span></div>
          <div class="pub-stat"><span class="pub-stat-num" id="stat-intl">—</span><span class="pub-stat-label">Int'l Conferences</span></div>
          <div class="pub-stat"><span class="pub-stat-num" id="stat-domestic">—</span><span class="pub-stat-label">Domestic Conferences</span></div>
          <div class="pub-stat"><span class="pub-stat-num" id="stat-first">—</span><span class="pub-stat-label">First Author</span></div>
          <div class="pub-stat"><span class="pub-stat-num" id="stat-citations">—</span><span class="pub-stat-label">Citations</span></div>
        </div>

        <div class="pub-export">
          <button id="create-paper-list-btn" class="pub-export-btn" type="button">Export Paper List</button>
          <p class="pub-export-note">You can export the list of papers in Word format (.doc).</p>
        </div>

        <h2 id="publication-details" class="section-label">Publication Details</h2>
        <div class="pub-filters" aria-label="Publication filters">
          <div class="pub-filter-field pub-filter-field--keyword">
            <label for="pub-search-keyword" class="pub-filter-label">Keyword</label>
            <input id="pub-search-keyword" type="search" class="pub-filter-input" placeholder="Title / Authors / Venue">
          </div>
          <div class="pub-filter-field">
            <label for="pub-filter-year" class="pub-filter-label">Year</label>
            <select id="pub-filter-year" class="pub-filter-select">
              <option value="">All years</option>
            </select>
          </div>
          <label class="pub-filter-check">
            <input id="pub-filter-first-author" type="checkbox">
            <span>First-author only</span>
          </label>
          <button id="pub-filter-reset" class="pub-filter-reset-btn" type="button">Reset</button>
        </div>

        <div class="pub-tabs" role="tablist" aria-label="Publication categories">
          <button class="pub-tab active" type="button" data-tab="journal">Journal Papers <span class="pub-tab-count" id="tab-count-journal">0</span></button>
          <button class="pub-tab" type="button" data-tab="intl">International Conf. <span class="pub-tab-count" id="tab-count-intl">0</span></button>
          <button class="pub-tab" type="button" data-tab="domestic">Domestic Conf. <span class="pub-tab-count" id="tab-count-domestic">0</span></button>
        </div>
        <div class="pub-list active" id="tab-journal"></div>
        <div class="pub-list" id="tab-intl"></div>
        <div class="pub-list" id="tab-domestic"></div>
      </section>
    </div>
  </main>

  <footer id="site-footer"></footer>
  <script src="js/main.js"></script>
  <script src="js/components/tabs.js"></script>
  <script src="js/pages/publications.js"></script>
</body>
</html>
