<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home | Hiroki Kobayashi</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pages/home.css">
</head>
<body data-page="index" data-page-title="Hiroki Kobayashi" data-page-tagline="PhD in Engineering · Araya Inc." data-page-image="images/profile.jpg" data-page-description="Official homepage of Hiroki Kobayashi, AI engineer and researcher focused on computer vision, anomaly detection, and practical industrial deep learning systems.">
  <div id="site-header"></div>
  <div id="site-nav"></div>

  <main>
    <div class="content">
      <section aria-labelledby="home-overview-heading">
        <h2 id="home-overview-heading" class="section-label">Overview</h2>
        <div class="about-text" id="overview-text"></div>
        <div class="tag-cloud tag-cloud--spaced" id="tag-cloud"></div>
      </section>

      <section aria-labelledby="selected-publications-heading">
        <h2 id="selected-publications-heading" class="section-label">Selected Publications</h2>
        <div id="selected-publications-list"></div>
      </section>

      <section aria-labelledby="featured-project-heading">
        <h2 id="featured-project-heading" class="section-label">Featured Project</h2>
        <div id="featured-project-list"></div>
      </section>
    </div>

    <aside class="sidebar">
      <div class="stats-grid">
        <div class="stat-cell"><span class="stat-num" id="stat-journal">-</span><span class="stat-label">Journal Papers</span></div>
        <div class="stat-cell"><span class="stat-num" id="stat-intl">-</span><span class="stat-label">Int'l Conf.</span></div>
        <div class="stat-cell"><span class="stat-num" id="stat-domestic">-</span><span class="stat-label">Domestic Conf.</span></div>
        <div class="stat-cell"><span class="stat-num" id="stat-awards">-</span><span class="stat-label">Awards</span></div>
      </div>

      <section class="info-card" aria-labelledby="affiliation-heading">
        <h2 id="affiliation-heading" class="info-card-title">Affiliation</h2>
        <div id="affiliation-body"></div>
      </section>

      <section class="info-card visitor-counter-card" aria-labelledby="visitor-counter-heading">
        <h2 id="visitor-counter-heading" class="info-card-title">Visitor Counter</h2>
        <p class="visitor-counter-subtitle">Thank you for visiting this page.</p>
        <div class="visitor-counter" role="status" aria-live="polite">
          <div class="visitor-counter-label">Total visits</div>
          <div class="visitor-counter-digits" id="visitor-counter-digits">000,000,000</div>
        </div>
      </section>

      <nav class="info-card" aria-labelledby="quick-links-heading">
        <h2 id="quick-links-heading" class="info-card-title">Quick Links</h2>
        <div class="info-row"><span class="info-val"><a href="about.html" class="link-accent">About</a></span></div>
        <div class="info-row"><span class="info-val"><a href="projects.html" class="link-accent">Projects</a></span></div>
        <div class="info-row"><span class="info-val"><a href="publications.html" class="link-accent">Publications</a></span></div>
        <div class="info-row"><span class="info-val"><a href="awards.html" class="link-accent">Awards</a></span></div>
        <div class="info-row"><span class="info-val"><a href="education.html" class="link-accent">Education</a></span></div>
        <div class="info-row"><span class="info-val"><a href="certifications.html" class="link-accent">Certifications</a></span></div>
        <div class="info-row"><span class="info-val"><a href="contact.html" class="link-accent">Contact</a></span></div>
      </nav>
    </aside>
  </main>

  <footer id="site-footer"></footer>

  <script src="js/main.js"></script>
  <script src="js/pages/home.js"></script>
</body>
</html>
