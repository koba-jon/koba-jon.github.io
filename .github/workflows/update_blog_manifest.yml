name: Update Blog Manifest

on:
  push:
    branches:
      - main
    paths:
      - 'blog/**/*.md'
      - 'scripts/update_blog_manifest.py'
      - '.github/workflows/update_blog_manifest.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-blog-manifest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Regenerate blog/posts.json
        run: |
          python scripts/update_blog_manifest.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add blog/posts.json
          git diff --cached --quiet || git commit -m "Update blog manifest"
          git push
